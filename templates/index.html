<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Nhận diện biển báo nguy hiểm</title>

    <!-- <link rel="stylesheet" href="/static/css/style.css" /> -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        margin: 0;
        padding: 20px;
      }

      h1 {
        text-align: center;
        color: #222;
      }

      .panel {
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 0 8px #ccc;
        margin-bottom: 20px;
      }

      .control {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        align-items: center;
      }

      .group {
        border: 1px solid #ddd;
        padding: 10px;
        border-radius: 8px;
        background: #fafafa;
      }

      .group-title {
        font-weight: bold;
        margin-bottom: 8px;
        text-align: center;
      }

      button {
        padding: 9px 14px;
        margin: 3px;
        border: none;
        border-radius: 6px;
        background: #1976d2;
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: #0d47a1;
      }

      .danger {
        background: #d32f2f;
      }

      .danger:hover {
        background: #9a0007;
      }

      .green {
        background: #2e7d32;
      }

      .green:hover {
        background: #1b5e20;
      }

      input {
        margin: 5px;
      }

      .status {
        text-align: center;
        font-weight: bold;
        color: green;
        margin: 15px 0;
      }

      .container {
        display: flex;
        gap: 20px;
        justify-content: center;
      }

      .box {
        width: 50%;
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 0 8px #ccc;
        text-align: center;
        min-height: 360px;
      }

      img,
      video {
        max-width: 100%;
        border: 1px solid #ccc;
        border-radius: 6px;
      }

      .history {
        margin: 30px auto;
        width: 98%;
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 0 8px #ccc;
      }

      .chart-box {
        width: 98%;
        height: 360px;
        margin: 25px auto;
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 0 8px #ccc;
        overflow: hidden;
      }

      .chart-box canvas {
        width: 100% !important;
        height: 300px !important;
      }
    </style>
  </head>

  <body>
    <h1>Hệ thống nhận diện biển báo nguy hiểm</h1>

    <div class="panel">
      <div class="control">
        <div class="group">
          <div class="group-title">Điều khiển chung</div>
          <button onclick="resetHistory()">Reset lịch sử</button>
          <button class="danger" onclick="clearAll()">Xóa tất cả</button>
        </div>

        <div class="group">
          <div class="group-title">Camera</div>
          <button class="green" onclick="startCamera()">Kết nối Camera</button>
          <button class="danger" onclick="stopCamera()">Ngắt Camera</button>
        </div>

        <div class="group">
          <div class="group-title">Upload Ảnh</div>
          <input type="file" id="imageInput" accept="image/*" />
          <button onclick="uploadImage()">Bắt đầu nhận diện ảnh</button>
          <button class="danger" onclick="clearImage()">Xóa ảnh</button>
        </div>

        <div class="group">
          <div class="group-title">Upload Video</div>
          <input type="file" id="videoInput" accept="video/*" />
          <button onclick="uploadVideo()">Bắt đầu nhận diện video</button>
          <button onclick="pauseVideo()">Tạm dừng / Tiếp tục</button>
          <button class="danger" onclick="clearVideo()">Xóa video</button>
        </div>

        <div class="group">
          <div class="group-title">Output</div>
          <button onclick="downloadOutput()">Download Output</button>
          <button onclick="downloadChart()">Tải biểu đồ</button>
        </div>
      </div>
    </div>

    <div class="status" id="statusText">Chưa chọn nguồn đầu vào</div>

    <div class="container">
      <div class="box">
        <h3>Input</h3>

        <img id="inputImage" src="" style="display: none; width: 100%" />
        <img id="inputStream" src="" style="display: none; width: 100%" />

        <video
          id="inputVideo"
          muted
          playsinline
          controls
          style="display: none; width: 100%"
        ></video>

        <p id="cameraText" style="display: none">
          Camera máy tính đang hoạt động
        </p>
      </div>

      <div class="box">
        <h3>Output - AI nhận diện</h3>

        <img id="outputImage" src="" style="display: none; width: 100%" />

        <video
          id="outputVideo"
          controls
          style="display: none; width: 100%"
        ></video>
      </div>
    </div>

    <!-- <div class="history">
      <h3>Lịch sử nhận diện</h3>
      <ul id="historyList"></ul>
    </div> -->
    <div class="chart-box">
      <h3>Biểu đồ thống kê số lần nhận diện</h3>
      <canvas id="countChart"></canvas>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/history.js"></script>
    <script src="/static/js/camera.js"></script>
    <script src="/static/js/image.js"></script>
    <script src="/static/js/video.js"></script>
    <script src="/static/js/chart.js"></script>
    <script src="/static/js/sound.js"></script>
    <script src="/static/js/download.js"></script>
  </body>
</html>
